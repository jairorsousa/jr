services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: always
    volumes:
      - .:/var/www/html
      - storage_data:/var/www/html/storage/app
      - logs_data:/var/www/html/storage/logs
    depends_on:
      - redis
    networks:
      - jr-network
    environment:
      - APP_ENV=production

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - jr-network

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-jr_redis_secret}
    volumes:
      - redis_data:/data
    networks:
      - jr-network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: always
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - redis
    networks:
      - jr-network

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: always
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
    depends_on:
      - app
    networks:
      - jr-network

volumes:
  redis_data:
  storage_data:
  logs_data:

networks:
  jr-network:
    driver: bridge
